<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تقييم المحاضرة</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0;padding:24px}
    .card{max-width:760px;margin:auto;background:#fff;padding:24px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h2{margin-top:0;color:#c8102e}
    label{display:block;margin:14px 0 6px;font-weight:bold}
    select, textarea, button{width:100%;padding:12px;border:1px solid #d0d7e2;border-radius:10px;font-size:16px}
    textarea{min-height:120px}
    button{margin-top:18px;background:#c8102e;color:#fff;border:none;cursor:pointer}
    .note{background:#fff8f9;border-right:4px solid #c8102e;padding:12px;border-radius:8px;color:#444;margin-bottom:14px}
  </style>
</head>
<body>
  <div class="card">
    <h2>تقييم المحاضرة</h2>
    <p class="note">نشكر لك تعبئة تقييم المحاضرة.</p>

    <form id="feedbackForm">
      <label>تقييمك العام للمحاضرة</label>
      <select name="rating" required>
        <option value="">اختر</option>
        <option value="ممتاز">ممتاز</option>
        <option value="جيد جدًا">جيد جدًا</option>
        <option value="جيد">جيد</option>
        <option value="مقبول">مقبول</option>
        <option value="ضعيف">ضعيف</option>
      </select>

      <label>ملاحظاتك</label>
      <textarea name="comments" placeholder="اكتب ملاحظاتك هنا"></textarea>

      <button type="submit">إرسال التقييم</button>
    </form>
  </div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzd31qE9bFDXnb2PlF5jfWepMVoLlO9tnqy1h72--7hj57rhmkKFwFwE3QFY8OMzj-/exec';

document.getElementById('feedbackForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const traineeData = JSON.parse(localStorage.getItem('traineeData') || '{}');
  const feedbackData = Object.fromEntries(new FormData(e.target).entries());

  const payload = {
    action: 'submitFeedback',
    fullName: traineeData.fullName || '',
    employeeId: traineeData.employeeId || '',
    email: traineeData.email || '',
    rating: feedbackData.rating || '',
    comments: feedbackData.comments || '',
    submittedAt: new Date().toISOString()
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    alert('تم إرسال التقييم بنجاح');
    window.location.href = 'index.html';
  } catch (err) {
    console.error(err);
    alert('حدث خطأ أثناء إرسال التقييم');
  }
});
</script>
</body>
</html>
