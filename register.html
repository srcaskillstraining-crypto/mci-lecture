<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل المتدرب</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0;padding:24px}
    .card{max-width:760px;margin:auto;background:#fff;padding:24px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h2{margin-top:0;color:#c8102e}
    label{display:block;margin:14px 0 6px;font-weight:bold}
    input{width:100%;padding:12px;border:1px solid #d0d7e2;border-radius:10px;font-size:16px}
    button{margin-top:18px;background:#c8102e;color:#fff;border:none;padding:14px 20px;border-radius:10px;font-size:18px;cursor:pointer;width:100%}
    .note{background:#fff8f9;border-right:4px solid #c8102e;padding:12px;border-radius:8px;color:#444}
  </style>
</head>
<body>
  <div class="card">
    <h2>تسجيل بيانات المتدرب</h2>
    <p class="note">بعد إدخال البيانات ستنتقل مباشرة إلى الاختبار. مدة الاختبار 15 دقيقة، ودرجة الاجتياز 8 من 10.</p>

    <form id="regForm">
      <label>الاسم الرباعي</label>
      <input name="fullName" required>

      <label>الرقم الوظيفي</label>
      <input name="employeeId" required>

      <label>البريد الإلكتروني الرسمي</label>
      <input name="email" type="email" required>

      <button type="submit">حفظ البيانات والانتقال للاختبار</button>
    </form>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzd31qE9bFDXnb2PlF5jfWepMVoLlO9tnqy1h72--7hj57rhmkKFwFwE3QFY8OMzj-/exec';

    document.getElementById('regForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const formData = Object.fromEntries(new FormData(e.target).entries());
      formData.action = 'register';
      formData.timestamp = new Date().toISOString();

      localStorage.setItem('traineeData', JSON.stringify(formData));

      const saved = localStorage.getItem('traineeData');
      if (!saved) {
        alert('تعذر حفظ البيانات محليًا. جرّبي تحديث الصفحة أو فتح الموقع في نافذة خاصة.');
        return;
      }

      try {
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
      } catch (err) {
        console.error(err);
      }

      window.location.href = 'quiz.html';
    });
  </script>
</body>
</html>
