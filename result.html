<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نتيجة الاختبار</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0;padding:24px}
    .card{max-width:760px;margin:auto;background:#fff;padding:24px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08);text-align:center}
    .pass{color:#0b7a27}.fail{color:#c8102e}
    .btn{display:inline-block;margin-top:18px;background:#c8102e;color:#fff;text-decoration:none;padding:12px 20px;border-radius:10px}
  </style>
</head>
<body>
<div class="card">
  <h2>نتيجة الاختبار</h2>
  <div id="content"></div>
  <a class="btn" href="feedback.html">الانتقال إلى تقييم المحاضرة</a>
</div>
<script>
const data = JSON.parse(localStorage.getItem('quizResult') || '{}');
const passed = data.score >= 8;
const el = document.getElementById('content');
el.innerHTML = `
  <p>الاسم: <strong>${data.fullName || '-'}</strong></p>
  <p>الدرجة: <strong>${data.score || 0} / 10</strong></p>
  <p>النسبة: <strong>${data.percentage || 0}%</strong></p>
  <p class="${passed?'pass':'fail'}"><strong>${passed ? 'مبروك، لقد اجتزت الاختبار.' : 'لم تحقق درجة الاجتياز.'}</strong></p>
  <p>${passed ? 'ستُرسل شهادة الاجتياز إلى بريدك الإلكتروني بعد معالجة النظام.' : 'يمكنك اعتماد سياسة إعادة الاختبار حسب ما تقرره الجهة المنظمة.'}</p>
`;
</script>
</body>
</html>
